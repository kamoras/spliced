<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15173a" />
      <stop offset="1" stop-color="#0a0b14" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- decorative waveform with a splice cut -->
  <g fill="#8b80ff">
    <rect x="100" y="470" width="16" height="40" rx="8" opacity="0.55" />
    <rect x="132" y="440" width="16" height="100" rx="8" opacity="0.7" />
    <rect x="164" y="410" width="16" height="160" rx="8" />
    <rect x="196" y="455" width="16" height="70" rx="8" opacity="0.7" />
    <rect x="228" y="420" width="16" height="140" rx="8" opacity="0.85" />
    <rect x="260" y="465" width="16" height="50" rx="8" opacity="0.55" />
    <rect x="292" y="400" width="16" height="180" rx="8" />
    <rect x="324" y="450" width="16" height="80" rx="8" opacity="0.7" />
  </g>
  <line x1="360" y1="380" x2="360" y2="600" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.85" />
  <g fill="#6c63d8">
    <rect x="392" y="455" width="16" height="70" rx="8" opacity="0.6" />
    <rect x="424" y="425" width="16" height="130" rx="8" opacity="0.75" />
    <rect x="456" y="470" width="16" height="40" rx="8" opacity="0.5" />
  </g>

  <text x="100" y="250" font-size="132" font-weight="800" fill="#ffffff" letter-spacing="2">SPLI<tspan fill="#8b80ff">|</tspan>CED</text>
  <text x="104" y="320" font-size="34" fill="#aab0cf" letter-spacing="8">A DAILY MUSIC PUZZLE</text>
</svg>

version: 2
updates:
  # Application dependencies
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Batch low-risk updates into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep GitHub Actions in the workflows up to date
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    groups:
      actions:
        update-types:
          - minor
          - patch

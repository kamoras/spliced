name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome 124 on Android, Safari on iPhone
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Console errors, screenshots, the puzzle number, etc.

name: Dependabot auto-merge

# Auto-approves and enables auto-merge for Dependabot patch/minor (and grouped)
# updates — which covers virtually all security fixes. Major updates are left
# for manual review. Because the CI check is required by branch protection,
# the merge only completes once CI passes.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch update metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge
        if: >-
          ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' ||
              steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

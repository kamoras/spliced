<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spliced — a daily music puzzle</title>
    <meta
      name="description"
      content="A daily music puzzle: a mystery song clip is chopped into pieces and shuffled. Rearrange them by ear and rebuild the song."
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f7fb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c0e15" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Spliced — a daily music puzzle" />
    <meta
      property="og:description"
      content="A mystery song clip, chopped up and shuffled. Rebuild it by ear — a new puzzle every day."
    />
    <meta property="og:image" content="/og.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Spliced — a daily music puzzle" />
    <meta
      name="twitter:description"
      content="A mystery song clip, chopped up and shuffled. Rebuild it by ear — a new puzzle every day."
    />

    <!-- Apply the saved theme before paint to avoid a flash of the wrong one. -->
    <script>
      try {
        var t = localStorage.getItem('spliced:theme');
        if (t === 'light' || t === 'dark')
          document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
